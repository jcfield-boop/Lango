<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Langoustine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:#111;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}
header{background:#1e1e1e;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #333;flex-shrink:0}
header h1{font-size:1.05rem;color:#7ec8e3;font-weight:600}
#ws-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;transition:background .3s}
#ws-dot.on{background:#7ee38e}
#ws-dot.err{background:#e37e7e}
#status-badge{font-size:0.75rem;color:#777;margin-left:4px}
#status-badge.recording{color:#e37e7e}
#status-badge.processing{color:#c8e37e}
#status-badge.thinking{color:#7ec8e3}
#status-badge.speaking{color:#b07ee3}
a.console-link{margin-left:auto;color:#555;font-size:0.75rem;text-decoration:none}
a.console-link:hover{color:#7ec8e3}
#transcript{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;flex-direction:column;gap:3px;max-width:85%}
.msg-row.user{align-self:flex-end;align-items:flex-end}
.msg-row.assistant{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:9px 13px;border-radius:16px;line-height:1.5;font-size:0.9rem;word-break:break-word;white-space:pre-wrap}
.msg-row.user .msg-bubble{background:#1a3a5c;color:#b8daff;border-bottom-right-radius:4px}
.msg-row.assistant .msg-bubble{background:#252525;color:#e0e0e0;border-bottom-left-radius:4px}
.msg-row.assistant .msg-bubble.streaming{opacity:0.75}
.msg-row.assistant .msg-bubble .cursor{display:inline-block;width:2px;height:1em;background:#7ec8e3;vertical-align:text-bottom;animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.msg-label{font-size:0.7rem;color:#555;padding:0 4px}
.tts-btn{background:none;border:none;color:#555;cursor:pointer;font-size:0.8rem;padding:2px 4px}
.tts-btn:hover{color:#b07ee3}
#error-bar{background:#5a1f1f;color:#ffaaaa;font-size:0.8rem;padding:6px 16px;flex-shrink:0;display:none}
#ptt-area{background:#1e1e1e;border-top:1px solid #333;padding:16px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:12px}
#text-row{display:flex;width:100%;gap:8px;max-width:600px}
#text-input{flex:1;background:#252525;color:#ddd;border:1px solid #444;padding:8px 12px;border-radius:20px;font-size:0.9rem;outline:none;font-family:inherit}
#text-input:focus{border-color:#555}
#send-btn{background:#1a3a5c;color:#b8daff;border:none;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:0.9rem}
#send-btn:hover{background:#234e7a}
#ptt-btn{width:72px;height:72px;border-radius:50%;border:3px solid #444;background:#1e1e1e;cursor:pointer;font-size:2rem;transition:all .15s;touch-action:none;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;color:#aaa}
#ptt-btn:hover{border-color:#666;color:#ddd}
#ptt-btn.active{border-color:#e37e7e;background:#3a1a1a;color:#e37e7e;transform:scale(1.05)}
#ptt-hint{font-size:0.72rem;color:#444}
</style>
</head>
<body>
<header>
  <span id="ws-dot"></span>
  <h1>&#x1F99E; Langoustine</h1>
  <span id="status-badge">idle</span>
  <a class="console-link" href="/console">dev console</a>
</header>
<div id="error-bar"></div>
<div id="transcript"></div>
<div id="ptt-area">
  <div id="text-row">
    <input id="text-input" type="text" placeholder="Type a message..." maxlength="512"
           onkeydown="if(event.key==='Enter')sendText()" autocomplete="off" spellcheck="false">
    <button id="send-btn" onclick="sendText()">&#x27A4;</button>
  </div>
  <button id="ptt-btn" title="Hold to speak (or hold Space)">&#x1F3A4;</button>
  <div id="ptt-hint">hold to speak &nbsp;&middot;&nbsp; space</div>
</div>
<script>
var ws,reconnectTimer=null;
var chatId='ws_'+Math.floor(Math.random()*99999);
var recorder=null,recording=false;
var streamBubble=null,lastTtsId=null;
var dot=document.getElementById('ws-dot');
var statusBadge=document.getElementById('status-badge');
var transcript=document.getElementById('transcript');
var pttBtn=document.getElementById('ptt-btn');
var errBar=document.getElementById('error-bar');

/* ── WebSocket ── */
function connect(){
  clearTimeout(reconnectTimer);reconnectTimer=null;
  if(ws){ws.onclose=null;try{ws.close()}catch(e){}}
  dot.className='';
  ws=new WebSocket('ws://'+location.host+'/ws');
  ws.binaryType='arraybuffer';
  ws.onopen=function(){dot.className='on';setStatus('idle')};
  ws.onclose=function(){
    dot.className='err';setStatus('offline');
    reconnectTimer=setTimeout(connect,4000);
  };
  ws.onerror=function(){};
  ws.onmessage=function(ev){
    if(typeof ev.data!=='string') return;
    try{
      var d=JSON.parse(ev.data);
      if(d.type==='token'&&d.chat_id===chatId) handleToken(d.content);
      else if(d.type==='message'&&d.chat_id===chatId) handleMessage(d.content,d.tts_id);
      else if(d.type==='status'&&d.chat_id===chatId) setStatus(d.stage);
      else if(d.type==='error'&&d.chat_id===chatId) showError(d.code+': '+(d.message||''));
    }catch(e){}
  };
}
setInterval(function(){if(ws&&ws.readyState===1){try{ws.send('{"type":"ping"}');}catch(e){}}},25000);

/* ── Status ── */
function setStatus(stage){
  var labels={idle:'idle',recording:'recording...',stt_processing:'transcribing...',
              llm_thinking:'thinking...',tts_generating:'generating audio...',speaking:'speaking...',offline:'offline'};
  statusBadge.textContent=labels[stage]||stage;
  statusBadge.className=stage;
}

/* ── Error bar ── */
function showError(msg){
  errBar.textContent=msg;
  errBar.style.display='block';
  setTimeout(function(){errBar.style.display='none';},5000);
}

/* ── Transcript helpers ── */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function addUserBubble(text){
  streamBubble=null;
  var row=document.createElement('div');
  row.className='msg-row user';
  row.innerHTML='<div class="msg-bubble">'+esc(text)+'</div>';
  transcript.appendChild(row);
  transcript.scrollTop=transcript.scrollHeight;
}

function startStreamBubble(){
  streamBubble=document.createElement('div');
  streamBubble.className='msg-bubble streaming';
  streamBubble.innerHTML='<span class="cursor"></span>';
  var row=document.createElement('div');
  row.className='msg-row assistant';
  row.appendChild(streamBubble);
  transcript.appendChild(row);
  transcript.scrollTop=transcript.scrollHeight;
  return streamBubble;
}

function handleToken(delta){
  if(!streamBubble) startStreamBubble();
  /* append delta before the cursor */
  var cursor=streamBubble.querySelector('.cursor');
  var textNode=document.createTextNode(delta);
  streamBubble.insertBefore(textNode,cursor);
  transcript.scrollTop=transcript.scrollHeight;
}

function handleMessage(text,ttsId){
  /* Replace streaming bubble with final text */
  if(streamBubble){
    var row=streamBubble.parentElement;
    streamBubble.className='msg-bubble';
    streamBubble.textContent=text;
    if(ttsId){
      var btn=document.createElement('button');
      btn.className='tts-btn';
      btn.title='Replay audio';
      btn.textContent='\u25B6\uFE0F';
      btn.onclick=function(){playTTS(ttsId)};
      row.appendChild(btn);
    }
    streamBubble=null;
  } else {
    /* No streaming — add fresh bubble (e.g., text-only response) */
    var row2=document.createElement('div');
    row2.className='msg-row assistant';
    var bubble=document.createElement('div');
    bubble.className='msg-bubble';
    bubble.textContent=text;
    row2.appendChild(bubble);
    if(ttsId){
      var btn2=document.createElement('button');
      btn2.className='tts-btn';
      btn2.title='Replay audio';
      btn2.textContent='\u25B6\uFE0F';
      btn2.onclick=function(){playTTS(ttsId)};
      row2.appendChild(btn2);
    }
    transcript.appendChild(row2);
  }
  transcript.scrollTop=transcript.scrollHeight;
  if(ttsId) playTTS(ttsId);
}

/* ── TTS playback ── */
function playTTS(id){
  lastTtsId=id;
  setStatus('speaking');
  var audio=new Audio('/tts/'+id);
  audio.onended=function(){setStatus('idle')};
  audio.onerror=function(){setStatus('idle')};
  audio.play().catch(function(){setStatus('idle')});
}

/* ── Text prompt ── */
function sendText(){
  var inp=document.getElementById('text-input');
  var text=inp.value.trim();
  if(!text||!ws||ws.readyState!==1) return;
  addUserBubble(text);
  ws.send(JSON.stringify({type:'prompt',content:text,chat_id:chatId}));
  startStreamBubble();
  setStatus('llm_thinking');
  inp.value='';
}

/* ── Push-to-talk ── */
function startRecording(){
  if(!ws||ws.readyState!==1||recording) return;
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
  .then(function(stream){
    var opts={mimeType:'audio/webm;codecs=opus'};
    try{recorder=new MediaRecorder(stream,opts)}
    catch(e){recorder=new MediaRecorder(stream)}
    var mime=recorder.mimeType||'audio/webm;codecs=opus';
    recorder.ondataavailable=function(ev){
      if(ev.data&&ev.data.size>0&&ws&&ws.readyState===1) ws.send(ev.data);
    };
    ws.send(JSON.stringify({type:'audio_start',mime:mime,chat_id:chatId}));
    recorder.start(250);
    recording=true;
    pttBtn.classList.add('active');
    setStatus('recording');
  })
  .catch(function(){showError('Microphone access denied')});
}

function stopRecording(){
  if(!recording||!recorder) return;
  recording=false;
  try{recorder.stop();recorder.stream.getTracks().forEach(function(t){t.stop()});}catch(e){}
  recorder=null;
  pttBtn.classList.remove('active');
  /* Small delay to flush last chunk before audio_end */
  setTimeout(function(){
    if(ws&&ws.readyState===1){
      ws.send(JSON.stringify({type:'audio_end',chat_id:chatId}));
      startStreamBubble();
      setStatus('stt_processing');
    }
  },120);
}

/* PTT button — touch + mouse */
pttBtn.addEventListener('mousedown',function(e){e.preventDefault();startRecording()});
pttBtn.addEventListener('mouseup',function(e){e.preventDefault();stopRecording()});
pttBtn.addEventListener('mouseleave',function(){if(recording)stopRecording()});
pttBtn.addEventListener('touchstart',function(e){e.preventDefault();startRecording()},{passive:false});
pttBtn.addEventListener('touchend',function(e){e.preventDefault();stopRecording()},{passive:false});
pttBtn.addEventListener('touchcancel',function(e){e.preventDefault();if(recording)stopRecording()},{passive:false});

/* Spacebar PTT */
var spaceDown=false;
document.addEventListener('keydown',function(e){
  if(e.code==='Space'&&!spaceDown&&e.target.tagName!=='INPUT'){
    e.preventDefault();spaceDown=true;startRecording();
  }
});
document.addEventListener('keyup',function(e){
  if(e.code==='Space'&&spaceDown){
    e.preventDefault();spaceDown=false;stopRecording();
  }
});

connect();
</script>
</body>
</html>
