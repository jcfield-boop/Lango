## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=5.5.0,<7.0.0'
  ## LittleFS filesystem driver
  joltwallet/littlefs:
    version: ">=1.14.0"
  ## mDNS for langoustine.local hostname resolution
  espressif/mdns:
    version: ">=1.2.0"
  ## UVC (USB Video Class) driver for USB webcam support
  espressif/usb_host_uvc:
    version: ">=2.0.0"
  ## UAC (USB Audio Class) driver for webcam microphone support
  espressif/usb_host_uac:
    version: ">=1.3.3"
  ## Pin USB host lib to IDF-6-compatible version (1.2.0 requires esp_hal_usb from IDF 7+)
  espressif/usb:
    version: "1.1.0"
  ## Wake word (WakeNet9 "Hi ESP") + VAD via Audio Front End
  espressif/esp-sr:
    version: ">=1.0.0"
