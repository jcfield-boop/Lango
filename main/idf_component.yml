## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=5.5.0,<7.0.0'
  ## LittleFS filesystem driver
  joltwallet/littlefs:
    version: ">=1.14.0"
  ## mDNS for langoustine.local hostname resolution
  espressif/mdns:
    version: ">=1.2.0"
  ## UVC (USB Video Class) driver for USB webcam support
  espressif/usb_host_uvc:
    version: ">=2.0.0"
  ## UAC (USB Audio Class) driver - patched copy in components/usb_host_uac/
  ## to relax OUT ctrl-transfer byte-count check for HS-only devices on FS USB.
  ## Do NOT re-add espressif/usb_host_uac here; use the project component instead.
  ## Pin USB host lib to IDF-6-compatible version (1.2.0 requires esp_hal_usb from IDF 7+)
  espressif/usb:
    version: "1.1.0"
  ## Wake word (WakeNet9 "Hi ESP") + VAD via Audio Front End
  espressif/esp-sr:
    version: ">=1.0.0"
  ## Opus audio codec — encode local mic PCM for smaller STT uploads
  78/esp-opus:
    version: ">=1.0.4"
